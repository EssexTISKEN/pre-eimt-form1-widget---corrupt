<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Formulaire employeur – PRÉ‑EIMT</title>

  <!-- SDK Zoho CRM -->
  <script src="https://js.zohostatic.com/crm/client-sdk/v1.0.0/zohocrm-sdk.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <h1>Formulaire employeur – PRÉ‑EIMT</h1>

  <!-- ========================= A. Informations générales ========================= -->
  <section>
    <h2>A. Informations générales</h2>

    <label>
      1. Avez-vous déjà déposé une EIMT pour ce poste ?
      <select id="EIMT_anterieure">
        <option value="">—</option>
        <option>Oui</option>
        <option>Non</option>
      </select>
    </label>

    <!-- Question conditionnelle -->
    <div id="grp_eimt_pdf" class="conditional hidden">
      <label>
        2. Si oui, téléversez la copie PDF de l’EIMT précédente :
        <input type="file" id="EIMT_anterieure_pdf"
          accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
      </label>
    </div>

  </section>


  <!-- ========================= B. Poste visé ========================= -->
  <section>
    <h2>B. Poste visé</h2>

    <label>
      3. Quel est le titre du poste ?
      <input type="text" id="Titre_poste">
    </label>

    <label>
      4. Avez-vous une description détaillée du poste ?
      <select id="Description_poste_existe">
        <option value="">—</option>
        <option>Oui</option>
        <option>Non</option>
      </select>
    </label>

    <!-- Conditionnel -->
    <div id="grp_desc_pdf" class="conditional hidden">
      <label>
        5. Si oui, téléversez la description du poste :
        <input type="file" id="Description_poste_pdf" accept=".pdf,.doc,.docx">
      </label>
    </div>

    <label>
      6. Combien de travailleurs sont visés par cette demande ?
      <input type="number" id="Nb_TET_vises" min="1" value="1">
    </label>

    <label>
      7. S’agit-il d’un renouvellement ?
      <select id="Renouvellement">
        <option value="">—</option>
        <option>Oui</option>
        <option>Non</option>
      </select>
    </label>

  </section>


  <!-- ========================= C. Lieu ========================= -->
  <section>
    <h2>C. Lieu de travail</h2>

    <label>8. Adresse :
      <input id="Adresse_LieuTravail" />
    </label>

    <label>9. Ville :
      <input id="Ville_LieuTravail" />
    </label>

    <label>10. Code postal :
      <input id="CodePostal_LieuTravail" />
    </label>

  </section>


  <!-- ========================= D. Rémunération ========================= -->
  <section>
    <h2>D. Rémunération</h2>

    <label>
      11. Tous les travailleurs ont-ils le même salaire ?
      <select id="Tous_meme_salaire">
        <option value="">—</option>
        <option>Oui</option>
        <option>Non</option>
      </select>
    </label>

    <div id="grp_salaire_unique" class="conditional hidden">
      <label>
        12. Si oui, quel est le salaire horaire unique ?
        <input id="Salaire_horaire_unique" type="number" step="0.01" min="0" />
      </label>
    </div>

    <div id="grp_liste_tet" class="conditional hidden">
      <label>13. Si non, veuillez indiquer les salaires par travailleur :</label>
      <table>
        <thead><tr><th>Prénom</th><th>Nom</th><th>Salaire horaire</th></tr></thead>
        <tbody id="tbl_body"></tbody>
      </table>
    </div>

    <label>
      14. Les travailleurs feront-ils des heures supplémentaires ?
      <select id="Heures_sup">
        <option value="">—</option>
        <option>Oui</option>
        <option>Non</option>
      </select>
    </label>

    <div id="grp_taux_hs" class="conditional hidden">
      <label>
        15. Taux des heures supplémentaires :
        <input id="Taux_heures_sup" type="number" step="0.01" min="0">
      </label>
    </div>

    <label>
      16. Nombre de jours de vacances :
      <input id="Vacances_jours" type="number" min="0" value="10">
    </label>

  </section>


  <!-- ========================= G. Informations complémentaires ========================= -->
  <section>
    <h2>G. Informations complémentaires</h2>

    <label>
      17. Informations complémentaires :
      <textarea id="Informations_complementaires"></textarea>
    </label>

    <label>
      18. Documents supplémentaires :
      <input type="file" id="Documents_supplementaires" multiple>
    </label>

  </section>


  <!-- Bouton soumettre -->
  <button id="btn_submit">Soumettre</button>
  <div id="msg"></div>

  <script src="app.js"></script>

</body>
</html>
``
